<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2f80ed">
    <meta name="description" content="小学生向けAI家庭学習PWA">
    <title>まいにちAIがくしゅう</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button" id="homeButton" type="button" aria-label="ホームへ">
          <span aria-hidden="true">⌂</span>
        </button>
        <div>
          <p class="eyebrow">小学生の家庭学習</p>
          <h1>まいにちAIがくしゅう</h1>
        </div>
        <button class="icon-button" id="historyButton" type="button" aria-label="学習履歴">
          <span aria-hidden="true">✓</span>
        </button>
      </header>

      <main id="app" class="main" aria-live="polite"></main>
    </div>

    <template id="cardTemplate">
      <section class="panel"></section>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
